<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body >
    <header class="header">
            <div class="header__logo">
                
                    <img src="/icon/logo.svg" alt="" class="image-icon">
              
            </div>
            <nav class="header__nav">
                 <a href="" class=" text-20-bold">
                    HOME
                </a>  
                 <a href="" class=" text-20-bold">
                    CATALOGS
                </a>
                <a href="" class=" text-20-bold">
                    BLOG
                </a>
                <a href="" class=" text-20-bold">
                    SHOP
                </a>
                 <a href="" class=" text-20-bold">
                    CONTACT US
                </a> 
                
            </nav>
            <div class="header__icon">
                    <a class="header__icon--search">
                        <img src="icon/search.svg" alt="" class=" image-icon">
                    </a>
                    <a class="header__icon--favorite">
                        <img src="icon/favorite.svg" alt="" class=" image-icon ">
                    </a>
                    <a href="" class="header__icon--avt">
                        <img src="icon/avt.svg" alt="" class=" image-icon">
                    </a>
                     <a href="" class="header__icon--cart">
                        <img src="icon/cart.svg" alt="" class=" image-icon">
                    </a>
            </div>
            <nav class="header__menu">
                <img src="icon/menu.svg" alt="" class="image-icon">
            </nav>
            
    </header>
     <main class="main"> 
        
        <div class="hero">
            <div class="sidebar"> 
                    <div class="sidebar__info">©2023  Dotcreativemarket
                    </div>
                    <div class="sidebar__link">
                        <div class="sidebar__icon">
                            <div class="icon-20">
                                <img src="icon/instagram.svg" alt="" class="image">
                            </div>
                            <div class="icon-20">
                                <img src="icon/twitter.svg" alt="" class="image">
                            </div>
                            <div class="icon-20">
                                <img src="icon/facebook.svg" alt="" class="image">
                            </div>
                            <div class="icon-20">
                                <img src="icon/linkedIn .svg" alt="" class="image">
                            </div>
                            <div class="sidebar__link--text">FOLLOW US</div>
                        </div>
                    </div>
            </div> 
            <div class="hero__main">
                <div class="hero__content">
                    <div class="hero__title">
                        <article class="hero--text">
                            <p class="text-18-regular">BEGIN BREAKING YOUR LIMIT</p>
                            <p class="text-60-medium">Know your limits. Ski beyond them.</p>
                        </article>
                        <div class="hero__info">
                            <button class="hero-info--btn">VIEW MORE</button>
                        </div>
                    </div>
                    <div class="hero__image">
                        <img src="img/a1.png" alt="" class="image">
                    </div>
                </div>
                <div class="hero__btn">
                    <img src="icon/direction.svg" alt="" class="back">
                    <img src="icon/direction.svg" alt="" class="next">
                </div>
            </div>    
        </div>
        
    </main>
    
</body>

</html>
